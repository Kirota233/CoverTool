<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>自动化封面合成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'DouyinFont';
            src: url('./fonts/Douyin.ttf'); 
        }
        /* 给画布加个鼠标指针，暗示可以拖拽 */
        #previewCanvas {
            cursor: grab;
        }
        #previewCanvas:active {
            cursor: grabbing;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans p-8">
    <div class="max-w-6xl mx-auto flex gap-8">
        
        <div class="w-1/3 bg-white p-6 rounded-xl shadow-sm border border-slate-200 overflow-y-auto max-h-[90vh]">
            
            <h2 class="text-xl font-bold mb-6 text-slate-800">1. 封面批量生成</h2>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-700">选择基础底图 (.png/.jpg)</label>
                    <input type="file" id="imageInput" accept="image/*" class="w-full text-sm border p-2 rounded cursor-pointer bg-slate-50">
                </div>

                <hr class="border-slate-100">

                <h3 class="text-sm font-bold text-slate-700 mb-2 flex items-center gap-2">文字排版</h3>
                
                <!-- 新增：自定义字体上传 -->
                <div class="bg-blue-50 p-3 rounded-lg border border-blue-100 mb-4">
                    <label class="block text-xs font-bold mb-1 text-blue-700">上传自己的字体 (.ttf / .otf)</label>
                    <input type="file" id="customFontInput" accept=".ttf,.otf,.woff" class="w-full text-xs border border-blue-200 p-1.5 rounded cursor-pointer bg-white">
                </div>

                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="block text-xs font-medium mb-1 text-slate-500">选择字体</label>
                        <select id="fontFamily" class="w-full border p-2 rounded text-sm bg-slate-50">
                            <option value="'DouyinFont'">抖音美好体</option>
                            <option value="sans-serif">默认黑体</option>
                            <option value="'Microsoft YaHei'">微软雅黑</option>
                            <option value="SimHei">黑体</option>
                        </select>
                    </div>
                    <div class="w-1/2">
                        <label class="block text-xs font-medium mb-1 text-slate-500">粗细</label>
                        <select id="fontWeight" class="w-full border p-2 rounded text-sm bg-slate-50">
                            <option value="bold">加粗 (Bold)</option>
                            <option value="normal">常规 (Normal)</option>
                            <option value="900">极粗 (Black)</option>
                        </select>
                    </div>
                </div>

                <!-- 新增：字体颜色 -->
                <div class="flex gap-4">
                    <div class="w-1/4">
                        <label class="block text-xs font-medium mb-1 text-slate-500">字体颜色</label>
                        <input type="color" id="fontColor" value="#ffffff" class="h-9 w-full cursor-pointer border-0 p-0 rounded">
                    </div>
                    <div class="w-1/4">
                        <label class="block text-xs font-medium mb-1 text-slate-500">字号</label>
                        <input type="number" id="fontSize" value="80" class="w-full border p-2 rounded text-sm bg-slate-50">
                    </div>
                    <div class="w-1/4">
                        <label class="block text-xs font-medium mb-1 text-slate-500">字间距</label>
                        <input type="number" id="letterSpacing" value="0" class="w-full border p-2 rounded text-sm bg-slate-50">
                    </div>
                </div>

                <!-- X 和 Y 坐标输入框 (保留它们，拖拽时这里的数字会跟着变) -->
                <div class="flex gap-4 bg-slate-50 p-2 rounded border border-slate-200">
                    <div class="w-1/2">
                        <label class="block text-xs font-medium mb-1 text-slate-500">X 坐标 (可直接在右侧图内拖拽)</label>
                        <input type="number" id="posX" value="360" class="w-full border p-1.5 rounded text-sm">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-xs font-medium mb-1 text-slate-500">Y 坐标</label>
                        <input type="number" id="posY" value="640" class="w-full border p-1.5 rounded text-sm">
                    </div>
                </div>

                <hr class="border-slate-100">

                <h3 class="text-sm font-bold text-slate-700 mb-2 flex items-center gap-2">阴影与发光</h3>
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="block text-xs font-medium mb-1 text-slate-500">阴影颜色</label>
                        <input type="color" id="shadowColor" value="#000000" class="h-8 w-12 cursor-pointer border-0 p-0">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-xs font-medium mb-1 text-slate-500">模糊度 (Blur)</label>
                        <input type="number" id="shadowBlur" value="15" min="0" class="w-full border p-2 rounded text-sm bg-slate-50">
                    </div>
                </div>
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="block text-xs font-medium mb-1 text-slate-500">X 偏移 (右为正)</label>
                        <input type="number" id="shadowOffsetX" value="0" class="w-full border p-2 rounded text-sm bg-slate-50">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-xs font-medium mb-1 text-slate-500">Y 偏移 (下为正)</label>
                        <input type="number" id="shadowOffsetY" value="8" class="w-full border p-2 rounded text-sm bg-slate-50">
                    </div>
                </div>

                <hr class="border-slate-100">

                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-700">总集数</label>
                    <input type="number" id="totalEpisodes" value="26" class="w-full border p-2 rounded text-sm bg-slate-50 mb-4">
                    
                    <button id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-blue-200">
                        一键生成所有封面
                    </button>
                    <p id="status" class="text-sm text-center mt-3 text-slate-500"></p>
                </div>
            </div>

            <hr class="border-slate-200 my-8 border-dashed">

            <!-- 下方原有的第2步视频合成部分保持不变 -->
            <h2 class="text-xl font-bold mb-4 text-blue-700">2. 视频自动合成</h2>
            <div>
                <div class="flex gap-4 mb-4">
                    <div class="w-1/2">
                        <label class="block text-sm font-medium mb-1 text-slate-700">项目名 (输出前缀)</label>
                        <input type="text" id="projectName" value="项目名" class="w-full border p-2 rounded text-sm bg-slate-50">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-sm font-medium mb-1 text-slate-700">输出分辨率 (比例)</label>
                        <select id="videoResolution" class="w-full border p-2 rounded text-sm bg-slate-50">
                            <option value="1080x1920">1080×1920 (9:16 高清)</option>
                            <option value="720x1280">720×1280 (9:16 标清)</option>
                            <option value="1080x1440">1080×1440 (3:4 小红书)</option>
                            <option value="1080x1080">1080×1080 (1:1 正方形)</option>
                            <option value="1920x1080">1920×1080 (16:9 横屏)</option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1 text-slate-700">选择原视频所在文件夹</label>
                    <div class="flex gap-2">
                        <button id="selectFolderBtn" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded text-sm transition-colors whitespace-nowrap font-medium">选择目录</button>
                        <input type="text" id="videoFolderDisplay" readonly placeholder="请确保文件夹内有 EP1.mp4..." class="w-full border p-2 rounded text-sm bg-slate-100 text-slate-500">
                    </div>
                </div>
                
                <button id="startSynthesisBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-green-200 mt-2 disabled:opacity-50 disabled:cursor-not-allowed">
                    开始批量合成视频
                </button>
                <div id="synthesisStatusBox" class="hidden mt-4 p-3 rounded bg-slate-100 border border-slate-200">
                    <p id="synthesisStatus" class="text-sm text-center text-slate-600 font-medium break-all"></p>
                </div>
            </div>

        </div>

        <div class="w-2/3 bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center justify-center bg-[url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAAXNSR0IArs4c6QAAACVJREFUKFNjZCASMDKgAhBq0f///w1RxaEahA7IFcMBjL7HwwIAtnMQ+w3w48cAAAAASUVORK5CYII=')]">
            <div class="w-full flex justify-between items-center mb-4">
                <h3 class="text-sm font-medium text-slate-500 bg-white px-2 rounded">实时预览 (EP1)</h3>
                <span class="text-xs text-blue-500 font-bold bg-white px-2 rounded">✨ 提示：可直接在下方图片中按住鼠标拖拽文字</span>
            </div>
            <!-- Canvas ID 没变 -->
            <canvas id="previewCanvas" width="720" height="1280" class="border border-slate-300 shadow-2xl max-h-[75vh] w-auto bg-white"></canvas>
        </div>
    </div>

    <script src="./renderer.js"></script>
</body>
</html>
